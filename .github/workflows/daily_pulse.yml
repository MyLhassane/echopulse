name: Daily EchoPulse Radar

on:
  schedule:
    # سيتم التشغيل الساعة 04:40 صباحاً بتوقيت جرينتش (UTC)
    - cron: "40 4 * * *"
  workflow_dispatch: # للتشغيل اليدوي الفوري

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.9"

      - name: Install dependencies
        run: |
          # تأكد أن اسم المجلد هنا يطابق الاسم الجديد تماماً (بدون 005.)
          pip install -r echopulse/requirements.txt

      - name: Run EchoPulse Script
        run: |
          # تأكد من تحديث المسار هنا أيضاً
          python echopulse/main.py

      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .
          git commit -m "Update Tech Radar: $(date +'%Y-%m-%d')" || exit 0
          git push
